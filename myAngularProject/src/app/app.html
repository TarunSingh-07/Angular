<p>Value of a : {{ a }}</p>
<p>Value of b: {{ b }}</p>
<p>Addition is: {{ ans }}</p>

<div>
    <h1>Property Binding</h1>
    <!-- By interpolation -->
    <input type="text" class="styled-input" value="{{ inputValue }}">  
    <br /><br />
    <!-- By propertyBinding -->
    <input type="text" class="styled-input" [value]="inputValue">   
</div>

<div>
    <h1>Property Binding</h1>
    <input 
    type="text" 
    class="styled-input" 
    value="{{ inputValue }}"
    disabled="{{ isDisabled }}"
    >
    <br /><br />
    <input 
    type="text" 
    class="styled-input" 
    [value]="inputValue"
    [disabled]="isDisabled"
    >   
</div>
